name: nourmed-secure

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_APP_URL: ${NEXT_PUBLIC_SITE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT}
      CONTACT_RATE_LIMIT_WINDOW_MS: ${CONTACT_RATE_LIMIT_WINDOW_MS}
      CONTACT_RATE_LIMIT_MAX: ${CONTACT_RATE_LIMIT_MAX}
      PAYMENTS_RATE_LIMIT_WINDOW_MS: ${PAYMENTS_RATE_LIMIT_WINDOW_MS}
      PAYMENTS_RATE_LIMIT_MAX: ${PAYMENTS_RATE_LIMIT_MAX}
      SCAN_RATE_LIMIT_WINDOW_MS: ${SCAN_RATE_LIMIT_WINDOW_MS}
      SCAN_RATE_LIMIT_MAX: ${SCAN_RATE_LIMIT_MAX}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      LEAD_NOTIFICATION_TO: ${LEAD_NOTIFICATION_TO}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL}
      SCAN_HTTP_TIMEOUT_MS: ${SCAN_HTTP_TIMEOUT_MS}
      SCAN_MAX_RESPONSE_BYTES: ${SCAN_MAX_RESPONSE_BYTES}
      SCAN_ALLOW_PRIVATE_TARGETS: ${SCAN_ALLOW_PRIVATE_TARGETS}
      SCAN_USER_AGENT: ${SCAN_USER_AGENT}
      TRUST_PROXY: ${TRUST_PROXY}
      LOG_LEVEL: ${LOG_LEVEL}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS}
    security_opt:
      - no-new-privileges:true
    networks:
      - edge_network
      - backend_network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('node:http');const req=http.get('http://127.0.0.1:4000/health',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        API_PROXY_TARGET: ${API_PROXY_TARGET}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - edge_network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('node:http');const req=http.get('http://127.0.0.1:3000',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - edge_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/nginx-health >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

networks:
  edge_network:
  backend_network:
    internal: true
